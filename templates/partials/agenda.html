<div class="section-title" style="display:flex; align-items:center; justify-content:space-between;">
    <span><i class="ti ti-calendar-week" style="margin-right:6px;color:var(--color-primary);"></i>Agenda — Semaine du {% now "d N Y" %}</span>
</div>
<div class="table-wrap">
    <div style="padding: 10px 18px; display: flex; flex-direction: column;">
        {% for item in agenda_items %}
        <div style="display: flex; gap: 15px; padding: 12px 0; border-bottom: 1px solid var(--color-border-tertiary);">
            <div style="font-size: 11px; color: var(--color-text-secondary); min-width: 50px; text-align: right; line-height: 1.3;">
                {{ item.date }}<br><strong style="color: var(--color-text-primary);">{{ item.time }}</strong>
            </div>
            <div data-style-background="{{ item.color }}" style="width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;"></div>
            <div style="font-size: 13px; color: var(--color-text-primary); font-weight: 500;">{{ item.title }}</div>
        </div>
        {% empty %}
        <div class="empty-state" style="padding: 30px 0; text-align: center; color: var(--color-text-tertiary); font-size: 12.5px;">
            <i class="ti ti-calendar-off" style="font-size: 28px; display: block; margin-bottom: 8px;"></i>
            Aucun événement ni cours programmé pour cette semaine.
        </div>
        {% endfor %}
    </div>
</div>

<script>
    document.querySelectorAll('[data-style-background]').forEach(el => el.style.background = el.getAttribute('data-style-background'));
</script>
