{% if backups %}
<div class="table-wrap" style="margin-top: 10px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-sm); overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
        <thead>
            <tr style="background: var(--color-background-tertiary); text-align: left; border-bottom: 1px solid var(--color-border-tertiary);">
                <th style="padding: 10px 14px; font-weight: 600; color: var(--color-text-secondary);">Nom du fichier</th>
                <th style="padding: 10px 14px; font-weight: 600; color: var(--color-text-secondary);">Taille</th>
                <th style="padding: 10px 14px; font-weight: 600; color: var(--color-text-secondary);">Date de création</th>
                <th style="padding: 10px 14px; font-weight: 600; color: var(--color-text-secondary); text-align: right;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for b in backups %}
            <tr style="border-bottom: 1px solid var(--color-border-tertiary); background: var(--color-background-primary);">
                <td style="padding: 10px 14px; font-weight: 600; color: var(--color-text-primary); font-family: monospace;">{{ b.name }}</td>
                <td style="padding: 10px 14px; color: var(--color-text-secondary);">{{ b.size }}</td>
                <td style="padding: 10px 14px; color: var(--color-text-secondary);">{{ b.created_at|date:"d M Y H:i:s" }}</td>
                <td style="padding: 8px 14px; text-align: right; display: flex; gap: 8px; justify-content: flex-end; align-items: center;">
                    
                    <!-- Restaurer -->
                    <button class="btn btn-primary" 
                            hx-post="{% url 'db_restore_backup' %}" 
                            hx-vals='{"backup_name": "{{ b.name }}"}'
                            hx-confirm="⚠️ Êtes-vous sûr de vouloir RESTAURER cette sauvegarde ? Toute modification effectuée APRÈS cette sauvegarde sera perdue et l'application redémarrera."
                            hx-target="#settingsResult"
                            style="padding: 4px 10px; font-size: 11px; display: inline-flex; align-items: center; gap: 4px;">
                        <i class="ti ti-history"></i> Restaurer
                    </button>
                    
                    <!-- Supprimer -->
                    <button class="btn" 
                            hx-post="{% url 'db_delete_backup' %}" 
                            hx-vals='{"backup_name": "{{ b.name }}"}'
                            hx-confirm="Supprimer définitivement ce fichier de sauvegarde ?"
                            hx-target="closest tr"
                            hx-swap="outerHTML swap:0.4s"
                            style="padding: 4px 8px; font-size: 11px; display: inline-flex; align-items: center; color: #A32D2D; border: 1px solid rgba(163, 45, 45, 0.2); background: transparent;">
                        <i class="ti ti-trash"></i>
                    </button>
                    
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div style="padding: 20px; text-align: center; color: var(--color-text-tertiary); font-size: 12px; border: 1px dashed var(--color-border); border-radius: var(--border-radius-sm); margin-top: 10px;">
    <i class="ti ti-database-off" style="font-size: 24px; display: block; margin-bottom: 8px; color: var(--color-text-tertiary);"></i>
    Aucune sauvegarde disponible dans le dossier des médias.
</div>
{% endif %}
